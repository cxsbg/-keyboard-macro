name: Build Windows EXE

# 触发条件：当代码有更新，或者手动点击运行时触发
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    # 告诉 GitHub 免费分配一台 Windows 系统的电脑给您用
    runs-on: windows-latest

    steps:
    - name: 获取代码
      uses: actions/checkout@v4

    - name: 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装所需依赖库
      run: |
        python -m pip install --upgrade pip
        pip install keyboard pyautogui pyinstaller

    - name: 使用 PyInstaller 打包生成 exe
      run: |
        pyinstaller --onefile keyboard_macro.py

    - name: 上传生成的 exe 文件供下载
      uses: actions/upload-artifact@v4
      with:
        name: Keyboard_Macro_Program
        path: dist/keyboard_macro.exe
